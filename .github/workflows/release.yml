name: Build and Package Gramsrv

on:
  push:
    branches: [ "main", "develop" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.goarch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux amd64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary_name: gramsrv
          # Linux arm64 (For Raspberry Pi / Cloud ARM)
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            binary_name: gramsrv
          # Windows amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary_name: gramsrv.exe
          # macOS Intel
          - os: macos-latest
            goos: darwin
            goarch: amd64
            binary_name: gramsrv
          # macOS Apple Silicon (M1/M2/M3)
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary_name: gramsrv

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Go Environment
      uses: actions/setup-go@v5
      with:
        go-version: '1.22' 
        cache: true       

    - name: Install Linux Cross-Compilers
      if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: Run Tests
      if: matrix.goarch == 'amd64' && matrix.os != 'windows-latest'
      run: go test -v ./...

    - name: Build Binary
      shell: bash
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
        VERSION=${GITHUB_REF_NAME}
        
        echo "Building ${{ matrix.binary_name }} for ${{ matrix.goos }}/${{ matrix.goarch }}..."
        
        go build -ldflags "-s -w -X main.version=${VERSION} -X main.buildTime=${BUILD_TIME}" \
          -o build/${{ matrix.goos }}_${{ matrix.goarch }}/${{ matrix.binary_name }} .

    - name: Package Artifacts (Tar/Zip)
      shell: bash
      run: |
        cd build/${{ matrix.goos }}_${{ matrix.goarch }}
        if [ "${{ matrix.goos }}" = "windows" ]; then
          zip ../../gramsrv-${{ matrix.goos }}-${{ matrix.goarch }}.zip ${{ matrix.binary_name }}
        else
          tar -czvf ../../gramsrv-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz ${{ matrix.binary_name }}
        fi

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: gramsrv-${{ matrix.goos }}-${{ matrix.goarch }}
        path: |
          *.tar.gz
          *.zip
        retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Flatten Artifacts Directory
      run: |
        mkdir release_files
        find artifacts -type f -exec cp {} release_files/ \;
        ls -la release_files/

    - name: Generate Release
      uses: softprops/action-gh-release@v2
      with:
        files: release_files/*
        generate_release_notes: true
        draft: false
        prerelease: false