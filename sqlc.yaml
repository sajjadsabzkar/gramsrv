version: "2"
sql:
  - engine: "postgresql"
    # schema 只取 *.up.sql，避免 golang-migrate 的 down 脚本（DROP）被 sqlc 当成 schema 的一部分。
    # 与 golang-migrate 共用同一份迁移文件，单一事实源。
    schema: "deploy/migrations/*.up.sql"
    queries: "internal/store/postgres/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/store/postgres/sqlcgen"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
